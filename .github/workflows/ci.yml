name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src

  validate-installers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check shell syntax
        run: sh -n install.sh && sh -n uninstall.sh
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          pattern: "*.sh"
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $parseErrors = @()
          [System.Management.Automation.Language.Parser]::ParseFile(
            "${{ github.workspace }}/install.ps1",
            [ref]$null,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -gt 0) {
            $parseErrors
            exit 1
          }
      - name: Prepare fake docker shim
        run: |
          mkdir -p "$RUNNER_TEMP/installer-bin"
          cat > "$RUNNER_TEMP/installer-bin/docker" <<'EOF'
          #!/usr/bin/env sh
          set -eu
          case "${1:-}" in
            info)
              exit 0
              ;;
            pull)
              exit 0
              ;;
            compose)
              case "${2:-}" in
                version|up|down)
                  exit 0
                  ;;
              esac
              ;;
          esac
          printf 'unexpected docker invocation: %s\n' "$*" >&2
          exit 1
          EOF
          chmod +x "$RUNNER_TEMP/installer-bin/docker"
          echo "$RUNNER_TEMP/installer-bin" >> "$GITHUB_PATH"
      - name: Smoke test shell installer
        env:
          HOME: ${{ runner.temp }}/home-sh
          FREELUNCH_INSTALL_DIR: ${{ runner.temp }}/home-sh/.freelunch
          OPENROUTER_API_KEY: test-openrouter-key
          GATEWAY_API_KEY: ""
          FREELUNCH_PORT: "18000"
          FREELUNCH_AUTO_CONFIRM: "yes"
        run: |
          mkdir -p "$HOME"
          sh ./install.sh
          test -f "$FREELUNCH_INSTALL_DIR/.env"
          test -f "$FREELUNCH_INSTALL_DIR/config.yaml"
          test -f "$FREELUNCH_INSTALL_DIR/docker-compose.yml"
          grep -q '^OPENROUTER_API_KEY=test-openrouter-key$' "$FREELUNCH_INSTALL_DIR/.env"
          grep -q '^FREELUNCH_PORT=18000$' "$FREELUNCH_INSTALL_DIR/.env"
          sh ./uninstall.sh
          test ! -d "$FREELUNCH_INSTALL_DIR"
      - name: Smoke test PowerShell installer
        shell: pwsh
        env:
          USERPROFILE: ${{ runner.temp }}/home-ps
          FREELUNCH_INSTALL_DIR: ${{ runner.temp }}/home-ps/.freelunch
          OPENROUTER_API_KEY: test-openrouter-key-ps
          GATEWAY_API_KEY: ""
          FREELUNCH_PORT: "19000"
          FREELUNCH_AUTO_CONFIRM: "yes"
        run: |
          New-Item -ItemType Directory -Path $env:USERPROFILE -Force | Out-Null
          ./install.ps1
          if (-not (Test-Path "$env:FREELUNCH_INSTALL_DIR/.env")) { throw "missing .env" }
          if (-not (Test-Path "$env:FREELUNCH_INSTALL_DIR/config.yaml")) { throw "missing config.yaml" }
          if (-not (Test-Path "$env:FREELUNCH_INSTALL_DIR/docker-compose.yml")) { throw "missing docker-compose.yml" }
          $envContent = Get-Content "$env:FREELUNCH_INSTALL_DIR/.env" -Raw
          if ($envContent -notmatch "OPENROUTER_API_KEY=test-openrouter-key-ps") { throw "missing OpenRouter key" }
          if ($envContent -notmatch "FREELUNCH_PORT=19000") { throw "missing port" }
          ./uninstall.ps1
          if (Test-Path $env:FREELUNCH_INSTALL_DIR) { throw "install dir still exists after uninstall" }
          $parseErrors = @()
          [System.Management.Automation.Language.Parser]::ParseFile(
            "${{ github.workspace }}/uninstall.ps1",
            [ref]$null,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -gt 0) {
            $parseErrors
            exit 1
          }

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest tests --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80 --durations=10
      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t freelunch:test .
      - name: Run smoke container
        run: docker run -d --rm --name freelunch-smoke -p 8000:8000 -e APP_ENV=dev -e OPENROUTER_DEV_STUB_ENABLED=true freelunch:test
      - name: Smoke test healthz
        run: |
          python - <<'PY'
          import time
          import urllib.request

          last_error = None
          for _ in range(20):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=2) as response:
                      body = response.read().decode("utf-8")
                  if response.status == 200 and '"status":"ok"' in body.replace(" ", ""):
                      raise SystemExit(0)
                  last_error = RuntimeError(f"unexpected response: {response.status} {body}")
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          raise SystemExit(f"healthz smoke test failed: {last_error}")
          PY
      - name: Dump container logs on failure
        if: failure()
        run: docker logs freelunch-smoke
      - name: Stop smoke container
        if: always()
        run: docker stop freelunch-smoke
