name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest tests --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t freelunch:test .
      - name: Run smoke container
        run: docker run -d --rm --name freelunch-smoke -p 8000:8000 freelunch:test
      - name: Smoke test healthz
        run: |
          python - <<'PY'
          import time
          import urllib.request

          last_error = None
          for _ in range(20):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=2) as response:
                      body = response.read().decode("utf-8")
                  if response.status == 200 and '"status":"ok"' in body.replace(" ", ""):
                      raise SystemExit(0)
                  last_error = RuntimeError(f"unexpected response: {response.status} {body}")
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)
          raise SystemExit(f"healthz smoke test failed: {last_error}")
          PY
      - name: Dump container logs on failure
        if: failure()
        run: docker logs freelunch-smoke
      - name: Stop smoke container
        if: always()
        run: docker stop freelunch-smoke
