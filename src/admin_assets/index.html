<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FreeLunch Admin</title>
    <link rel="stylesheet" href="/admin/ui/app.css">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow">FreeLunch</p>
          <h1>Control Console</h1>
          <p class="subtitle">A routed, multi-provider gateway with an operator-first admin surface.</p>
        </div>

        <nav class="page-nav" aria-label="Admin sections">
          <button type="button" class="nav-link" data-page-link="health">Health</button>
          <button type="button" class="nav-link" data-page-link="vault">Vault</button>
          <button type="button" class="nav-link" data-page-link="models">Models</button>
          <button type="button" class="nav-link" data-page-link="settings">Settings</button>
          <button type="button" class="nav-link" data-page-link="logs">Logs</button>
        </nav>

        <section class="sidebar-card">
          <label for="bearerToken">Bearer token</label>
          <input id="bearerToken" type="password" placeholder="Optional when gateway auth is disabled">
          <div class="form-actions">
            <button id="saveTokenButton" type="button">Use token</button>
            <button id="clearTokenButton" type="button" class="ghost">Clear</button>
          </div>
          <p class="help-copy">This stays in browser session storage only.</p>
        </section>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <p id="pageEyebrow" class="eyebrow">Health</p>
            <h2 id="pageTitle">Gateway health and readiness</h2>
          </div>
          <div class="header-actions">
            <button id="refreshCurrentButton" type="button" class="ghost">Refresh page</button>
            <button id="refreshAllButton" type="button">Refresh all</button>
            <button id="refreshDiscoveryButton" type="button" class="ghost">Run discovery refresh</button>
          </div>
        </header>

        <section id="globalSummary" class="summary-strip"></section>

        <section class="workspace-status">
          <span id="statusMessage" class="status idle">Idle</span>
        </section>

        <section id="pageView" class="page-view"></section>
      </main>
    </div>

    <script type="module" src="/admin/ui/app.js"></script>
  </body>
</html>
